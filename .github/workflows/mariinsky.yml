          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate watcher syntax
        run: python -m py_compile mariinsky_agent.py

      - name: Run self-tests
        run: SELF_TEST=1 python mariinsky_agent.py

      - name: Run watcher
        run: python mariinsky_agent.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_FILE: state.json
          MAX_TELEGRAM_MESSAGES_PER_RUN: "5"
          MAX_PENDING_MESSAGES: "100"
          MESSAGE_SEND_DELAY_SECONDS: "2"

      - name: Update heartbeat
        if: always()
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run_utc.txt

      - name: Commit updated state and heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main || {
            echo "Could not rebase cleanly. Skipping state commit; next run will refresh."
            exit 0
          }

          if [[ -n "$(git status --porcelain state.json last_run_utc.txt)" ]]; then
            git add state.json last_run_utc.txt
            git commit -m "Update theatre watcher state" || {
              echo "Nothing to commit after rebase."
              exit 0
            }

            for attempt in 1 2 3; do
              if git push; then
                echo "State pushed."
                exit 0
              fi

              echo "Push failed on attempt $attempt. Refetching and retrying..."
              git pull --rebase --autostash origin main || {
                echo "Rebase failed after push rejection. Skipping state commit; next run will refresh."
                exit 0
              }
              sleep 2
            done

            echo "Push still failed after retries. Skipping state commit; next run will refresh."
            exit 0
          else
            echo "No state changes to commit."
          fi
