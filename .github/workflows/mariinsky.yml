name: Mariinsky Watcher

"on":
  workflow_dispatch:
    inputs:
      run_mode:
        description: "dry_run = audit only, bootstrap = baseline without Telegram, live = send Telegram notifications"
        required: false
        default: "live"
        type: choice
        options:
          - dry_run
          - bootstrap
          - live
      debug_url:
        description: "Optional single Mariinsky event URL to diagnose"
        required: false
        default: ""

concurrency:
  group: mariinsky-watcher-v3
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout main code
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: main-repo
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_v3.txt

      - name: Validate V3 files
        working-directory: main-repo
        run: |
          python -m py_compile mariinsky_watcher_v3.py test_mariinsky_watcher_v3.py
          python test_mariinsky_watcher_v3.py
          SELF_TEST=1 python mariinsky_watcher_v3.py

      - name: Prepare state branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf state-repo
          mkdir state-repo
          cd state-repo
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch --depth=1 origin theatre-watcher-state; then
            git checkout -B theatre-watcher-state FETCH_HEAD
          else
            git checkout --orphan theatre-watcher-state
            printf '{}\n' > state.json
            printf '{}\n' > scan_audit.json
            date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run_utc.txt
            git add state.json scan_audit.json last_run_utc.txt
            git commit -m "Initialize watcher state"
            git push origin HEAD:theatre-watcher-state
          fi

      - name: Run V3 watcher
        working-directory: main-repo
        env:
          RUN_MODE: ${{ github.event.inputs.run_mode || 'live' }}
          DEBUG_URL: ${{ github.event.inputs.debug_url || '' }}
          STATE_FILE: ../state-repo/state.json
          AUDIT_FILE: ../state-repo/scan_audit.json
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_TELEGRAM_MESSAGES_PER_RUN: "20"
          PENDING_WARNING_THRESHOLD: "500"
          MESSAGE_SEND_DELAY_SECONDS: "1.5"
          MONTHS_AHEAD: "8"
        run: python mariinsky_watcher_v3.py

      - name: Update heartbeat
        if: always()
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > state-repo/last_run_utc.txt

      - name: Commit state branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd state-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json scan_audit.json last_run_utc.txt

          if [[ -z "$(git status --porcelain state.json scan_audit.json last_run_utc.txt)" ]]; then
            echo "No state changes to commit."
            exit 0
          fi

          if git rev-parse --verify HEAD >/dev/null 2>&1; then
            git commit --amend --no-edit
          else
            git commit -m "Update watcher state"
          fi

          for attempt in 1 2 3; do
            if git push --force-with-lease origin HEAD:theatre-watcher-state; then
              echo "State branch updated."
              exit 0
            fi
            echo "State push failed on attempt $attempt. Refetching lease and retrying."
            git fetch --depth=1 origin theatre-watcher-state || true
            sleep 2
          done

          echo "State push failed after retries. Next run will recover from the latest state branch."
          exit 0
