              <aside>XXXIV Музыкальный фестиваль «Звезды белых ночей»</aside>
              <p>18 июня</p><p>Летучий голландец</p><p>20 июня</p><p>Аида</p><p>21 июня</p><p>Набукко</p>
              </body></html>
              """
              lines = html_lines(html, stop_re=MARIINSKY_STOP_RE)
              text = "\n".join(lines)
              assert "Дирижер — Андрей Иванов" in text
              assert "Солисты — Иван Петров, Мария Сидорова" in text
