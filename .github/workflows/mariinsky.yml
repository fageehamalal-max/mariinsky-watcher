name: Mariinsky Watcher

"on":
  workflow_dispatch:
  schedule:
    - cron: "13,43 5-20 * * *"

concurrency:
  group: mariinsky-watcher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create watcher files
        run: |
          cat > requirements.txt <<'REQ'
          requests==2.32.3
          beautifulsoup4==4.12.3
          REQ

          cat > mariinsky_agent.py <<'PY'
          import difflib
          import hashlib
          import json
          import os
          import re
          import time
          from datetime import date, datetime
          from pathlib import Path
          from urllib.parse import urljoin, urldefrag

          import requests
          from bs4 import BeautifulSoup


          PLAYBILL_URL = "https://www.mariinsky.ru/playbill/playbill/"
          STATE_FILE = Path(os.getenv("STATE_FILE", "state.json"))
          TELEGRAM_BOT_TOKEN = os.getenv("TELEGRAM_BOT_TOKEN", "").strip()
          TELEGRAM_CHAT_ID = os.getenv("TELEGRAM_CHAT_ID", "").strip()
          SEND_INITIAL = os.getenv("SEND_INITIAL", "0") == "1"
          STATE_VERSION = 3

          HEADERS = {
              "User-Agent": "Mozilla/5.0 MariinskyWatcher/1.2 (+https://github.com/fageehamalal-max/mariinsky-watcher)",
              "Accept-Language": "ru,en;q=0.9",
          }

          TARGET_VENUES = [
              "袦邪褉懈懈薪褋泻懈泄 褌械邪褌褉",
              "袦邪褉懈懈薪褋泻懈泄-2",
              "袣芯薪褑械褉褌薪褘泄 蟹邪谢",
              "袣芯薪褑械褉褌薪褘泄 蟹邪谢 袦邪褉懈懈薪褋泻芯谐芯 褌械邪褌褉邪",
              "袟邪谢 小褌褉邪胁懈薪褋泻芯谐芯",
              "袣邪屑械褉薪褘械 蟹邪谢褘",
              "袟邪谢 些械写褉懈薪邪",
              "袟邪谢 袦褍褋芯褉谐褋泻芯谐芯",
          ]

          EXCLUDED_VENUE_PARTS = [
              "袩褉懈屑芯褉褋泻邪褟 褋褑械薪邪",
              "袙谢邪写懈胁芯褋褌芯泻",
              "袙谢邪写懈泻邪胁泻邪蟹",
              "袪小袨",
              "袗谢邪薪懈褟",
              "袗谢邪薪懈懈",
          ]

          FOOTER_START_PATTERNS = [
              r"^袛谢褟 芯斜褉邪褖械薪懈泄$",
              r"^小锌褉邪胁芯褔薪邪褟 褋谢褍卸斜邪$",
              r"^袩芯 胁芯锌褉芯褋邪屑 褉械邪谢懈蟹邪褑懈懈 斜懈谢械褌芯胁$",
              r"^小泻邪褔邪褌褜 屑芯斜懈谢褜薪芯械 锌褉懈谢芯卸械薪懈械",
              r"^袥褞斜芯械 懈褋锌芯谢褜蟹芯胁邪薪懈械",
              r"^袟邪泻褉褘褌褜$",
              r"^袙褏芯写 胁 谢懈褔薪褘泄 泻邪斜懈薪械褌$",
          ]

          CONTENT_STOP_PATTERNS = [
              r"^袣褉邪褌泻芯械 褋芯写械褉卸邪薪懈械$",
              r"^小芯写械褉卸邪薪懈械$",
          ]

          NOISE_PATTERNS = [
              r"^@@",
              r"^(---|\+\+\+)\s",

              r"^(袗褎懈褕邪 懈 斜懈谢械褌褘|袩芯写邪褉芯褔薪褘械 泻邪褉褌褘|袛械褌褟屑|袙懈蟹懈褌 胁 褌械邪褌褉|孝褉褍锌锌邪|袨 褌械邪褌褉械|袧芯胁芯褋褌懈|袛谢褟 锌褉械褋褋褘|袗褎懈褕邪|袗斜芯薪械屑械薪褌褘|肖械褋褌懈胁邪谢懈|孝褍褉 锌芯 蟹邪泻褍谢懈褋褜褞|袨褉谐邪薪|袩褍褕泻懈薪褋泻邪褟 泻邪褉褌邪|校褔邪褋褌薪懈泻邪屑 小袙袨|袪械锌械褉褌褍邪褉)$",
              r"^(袠蟹屑械薪械薪懈褟 胁 邪褎懈褕械|袙褘斜褉邪褌褜 褋褑械薪褍|袙褘斜褉邪褌褜 褌懈锌 锌褉械写褋褌邪胁谢械薪懈褟|袙褘斜褉邪褌褜 屑械褋褟褑|袩芯泻邪蟹邪褌褜 褋锌械泻褌邪泻谢懈.*|袙褋械 锌谢芯褖邪写泻懈|袙褋械 褋锌械泻褌邪泻谢懈|袘谢懈卸邪泄褕懈泄|袗褉褏懈胁 邪褎懈褕懈)$",

              r"(泻褍锌懈褌褜|蟹邪泻邪蟹邪褌褜|锌褉芯写邪卸邪|褋褌芯懈屑芯褋褌褜|褑械薪邪|斜懈谢械褌|斜懈谢械褌芯胁|斜懈谢械褌褘|泻邪褋褋[邪械褘]|tickets@mariinsky\.ru)",

              r"(邪胁褌芯褉懈蟹邪褑懈褟|胁芯泄褌懈|褉械谐懈褋褌褉邪褑懈褟|蟹邪斜褘谢懈 锌邪褉芯谢褜|user_name|胁褘褏芯写|锌褉芯褎懈谢褜|泻芯褉蟹懈薪邪|蟹邪泻邪蟹褘|谢懈褔薪褘泄 泻邪斜懈薪械褌)",

              r"(锌芯写锌懈褋邪褌褜褋褟|锌芯懈褋泻|胁械褉褋懈褟 写谢褟 褋谢邪斜芯胁懈写褟褖懈褏|cookie|芯锌褉芯褋|蟹邪泻褉褘褌褜)",

              r"(写谢褟 芯斜褉邪褖械薪懈泄|褋锌褉邪胁芯褔薪邪褟 褋谢褍卸斜邪|post@mariinsky\.ru|褋泻邪褔邪褌褜 屑芯斜懈谢褜薪芯械 锌褉懈谢芯卸械薪懈械|mariinsky\.tv|mariinsky\.fm|锌褉邪胁芯芯斜谢邪写邪褌械谢)",

              r"(褌械邪褌褉:|褌械邪褌褉邪谢褜薪邪褟 锌谢芯褖邪写褜|褍谢\.|褍谢懈褑邪|写械泻邪斜褉懈褋褌芯胁|锌懈褋邪褉械胁邪|褎邪褋褌芯胁褋泻邪褟|胁谢邪写懈泻邪胁泻邪蟹|屑懈谢谢械褉邪|锌褉懈屑芯褉褋泻邪褟 褋褑械薪邪|褎懈谢懈邪谢)",

              r"^(facebook|instagram|youtube|vk|telegram)$",
          ]

          FOOTER_START_REGEXES = [re.compile(pattern, re.IGNORECASE) for pattern in FOOTER_START_PATTERNS]
          CONTENT_STOP_REGEXES = [re.compile(pattern, re.IGNORECASE) for pattern in CONTENT_STOP_PATTERNS]
          NOISE_REGEXES = [re.compile(pattern, re.IGNORECASE) for pattern in NOISE_PATTERNS]


          def utc_now_iso():
              return datetime.utcnow().replace(microsecond=0).isoformat() + "Z"


          def fetch(url):
              response = requests.get(url, headers=HEADERS, timeout=30)
              response.raise_for_status()
              return response.text


          def sha256(text):
              return hashlib.sha256(text.encode("utf-8")).hexdigest()


          def clean_line(line):
              line = line.replace("\xa0", " ")
              line = re.sub(r"\s+", " ", line)
              return line.strip()


          def is_footer_start(line):
              line = clean_line(line)
              return any(regex.search(line) for regex in FOOTER_START_REGEXES)


          def is_content_stop(line):
              line = clean_line(line)
              return any(regex.search(line) for regex in CONTENT_STOP_REGEXES)


          def is_noise_line(line):
              line = clean_line(line)
              if not line:
                  return True
              return any(regex.search(line) for regex in NOISE_REGEXES)


          def normalize_repertoire_text(text):
              result = []
              previous = None

              for raw in text.splitlines():
                  line = clean_line(raw)

                  if is_footer_start(line):
                      break

                  if is_content_stop(line):
                      break

                  if is_noise_line(line):
                      continue

                  if line == previous:
                      continue

                  result.append(line)
                  previous = line

              return "\n".join(result)


          def visible_text_from_soup(soup):
              for tag in soup(["script", "style", "noscript", "svg"]):
                  tag.decompose()

              lines = []

              for raw in soup.get_text("\n").splitlines():
                  line = clean_line(raw)

                  if is_footer_start(line):
                      break

                  if is_content_stop(line):
                      break

                  if is_noise_line(line):
                      continue

                  lines.append(line)

              result = []
              previous = None

              for line in lines:
                  if line != previous:
                      result.append(line)
                  previous = line

              return "\n".join(result)


          def normalize_url(href):
              absolute = urljoin(PLAYBILL_URL, href)
              absolute = urldefrag(absolute)[0]
              return absolute.rstrip("/") + "/"


          def extract_event_links(index_html):
              soup = BeautifulSoup(index_html, "html.parser")
              events = {}

              for a in soup.find_all("a", href=True):
                  href = a["href"]

                  if not re.search(r"/playbill/playbill/\d{4}/\d{1,2}/\d{1,2}/", href):
                      continue

                  url = normalize_url(href)
                  title = clean_line(a.get_text(" ", strip=True))

                  if not title:
                      events.setdefault(url, "")
                      continue

                  old_title = events.get(url, "")
                  if len(title) > len(old_title):
                      events[url] = title

              return events


          def extract_title(detail_soup, fallback):
              h1 = detail_soup.find("h1")
              if h1:
                  title = clean_line(h1.get_text(" ", strip=True))
                  if title:
                      return title

              for line in visible_text_from_soup(detail_soup).splitlines():
                  if len(line) > 3:
                      return line[:160]

              return fallback[:160] or "袘械蟹 薪邪蟹胁邪薪懈褟"


          def extract_venue_line(detail_text):
              lines = [clean_line(line) for line in detail_text.splitlines() if clean_line(line)]

              for line in lines[:40]:
                  if line.startswith("小邪薪泻褌-袩械褌械褉斜褍褉谐,"):
                      return line

              for line in lines[:40]:
                  if any(line == venue for venue in TARGET_VENUES):
                      return line

              return ""


          def venue_is_allowed(detail_text):
              venue_line = extract_venue_line(detail_text)
              source = venue_line or detail_text
              low = source.lower()

              if any(part.lower() in low for part in EXCLUDED_VENUE_PARTS):
                  return False

              return any(venue.lower() in low for venue in TARGET_VENUES)


          def line_says_ballet(line):
              low = line.lower()

              if "褌械邪褌褉 芯锌械褉褘 懈 斜邪谢械褌邪" in low:
                  return False

              if "斜邪谢械褌屑械泄褋褌械褉" in low:
                  return False

              if re.search(r"\b斜邪谢械褌\b", low):
                  return True

              if "褏芯褉械芯谐褉邪褎" in low or "褏芯褉械芯谐褉邪褎懈褔械褋泻" in low:
                  return True

              return False


          def is_ballet_event(title, detail_text):
              lines = [clean_line(line) for line in detail_text.splitlines() if clean_line(line)]

              for line in lines[:35]:
                  if line_says_ballet(line):
                      return True

              title_low = title.lower()
              if "斜邪谢械褌屑械泄褋褌械褉" in title_low:
                  return False

              return bool(re.search(r"\b斜邪谢械褌\b", title_low))


          def date_from_event_url(url):
              match = re.search(r"/playbill/playbill/(\d{4})/(\d{1,2})/(\d{1,2})/", url)
              if not match:
                  return None

              year, month, day = map(int, match.groups())

              try:
                  return date(year, month, day)
              except ValueError:
                  return None


          def is_past_event(url):
              event_date = date_from_event_url(url)
              if event_date is None:
                  return False
              return event_date < date.today()


          def load_state():
              if not STATE_FILE.exists():
                  return {"schema_version": 0, "events": {}}

              try:
                  state = json.loads(STATE_FILE.read_text(encoding="utf-8"))
              except Exception:
                  return {"schema_version": 0, "events": {}}

              if not isinstance(state, dict):
                  return {"schema_version": 0, "events": {}}

              if "events" not in state or not isinstance(state["events"], dict):
                  state["events"] = {}

              state.setdefault("schema_version", 0)
              return state


          def save_state(state):
              STATE_FILE.write_text(
                  json.dumps(state, ensure_ascii=False, indent=2, sort_keys=True),
                  encoding="utf-8",
              )


          def send_telegram(text):
              if not TELEGRAM_BOT_TOKEN or not TELEGRAM_CHAT_ID:
                  print("Telegram secrets are missing; message was not sent.")
                  return

              url = f"https://api.telegram.org/bot{TELEGRAM_BOT_TOKEN}/sendMessage"
              chunks = [text[i:i + 3900] for i in range(0, len(text), 3900)]

              for chunk in chunks:
                  response = requests.post(
                      url,
                      json={
                          "chat_id": TELEGRAM_CHAT_ID,
                          "text": chunk,
                          "disable_web_page_preview": True,
                      },
                      timeout=30,
                  )
                  response.raise_for_status()


          def make_diff(old_text, new_text, max_chars=2300):
              old_text = normalize_repertoire_text(old_text)
              new_text = normalize_repertoire_text(new_text)

              diff = difflib.unified_diff(
                  old_text.splitlines(),
                  new_text.splitlines(),
                  fromfile="斜褘谢芯",
                  tofile="褋褌邪谢芯",
                  lineterm="",
                  n=1,
              )

              lines = []

              for line in diff:
                  if line.startswith(("---", "+++", "@@")):
                      continue

                  if not line.startswith(("+", "-")):
                      continue

                  sign = line[0]
                  content = clean_line(line[1:])

                  if is_noise_line(content):
                      continue

                  lines.append(f"{sign} {content}")

              text = "\n".join(lines).strip()

              if len(text) > max_chars:
                  text = text[:max_chars].rstrip() + "\n\n[diff 芯斜褉械蟹邪薪]"

              return text


          def make_summary(text, max_lines=18, max_chars=900):
              lines = normalize_repertoire_text(text).splitlines()
              summary = "\n".join(lines[:max_lines]).strip()

              if len(summary) > max_chars:
                  summary = summary[:max_chars].rstrip() + "\n[芯斜褉械蟹邪薪芯]"

              return summary


          def build_event_record(url, fallback_title):
              detail_html = fetch(url)
              soup = BeautifulSoup(detail_html, "html.parser")

              title = extract_title(soup, fallback_title)
              detail_text = visible_text_from_soup(soup)
              normalized = normalize_repertoire_text(detail_text)

              if not normalized:
                  return None

              if is_ballet_event(title, normalized):
                  return None

              if not venue_is_allowed(normalized):
                  return None

              digest = sha256(normalized)
              summary = make_summary(normalized)

              return {
                  "url": url,
                  "title": title,
                  "summary": summary,
                  "detail_text": normalized,
                  "digest": digest,
              }


          def make_state(events):
              return {
                  "schema_version": STATE_VERSION,
                  "updated_at": utc_now_iso(),
                  "events": events,
              }


          def main():
              old_state = load_state()
              old_events = old_state.get("events", {})
              old_version = int(old_state.get("schema_version", 0) or 0)

              index_html = fetch(PLAYBILL_URL)
              links = extract_event_links(index_html)

              new_events = {}

              for url, fallback_title in sorted(links.items()):
                  if is_past_event(url):
                      continue

                  try:
                      record = build_event_record(url, fallback_title)
                      if record is not None:
                          new_events[url] = record
                      time.sleep(0.35)
                  except Exception as exc:
                      print(f"Failed to read {url}: {type(exc).__name__}: {exc}")

              if not old_events:
                  save_state(make_state(new_events))
                  print(f"Initial state created. Events tracked: {len(new_events)}")

                  if SEND_INITIAL:
                      send_telegram(
                          "袦芯薪懈褌芯褉懈薪谐 邪褎懈褕懈 袦邪褉懈懈薪褋泻芯谐芯 褌械邪褌褉邪 蟹邪锌褍褖械薪.\n\n"
                          f"小芯斜褘褌懈泄 胁 斜邪蟹械: {len(new_events)}\n"
                          "袘邪谢械褌褘 懈褋泻谢褞褔械薪褘. 袘懈谢械褌薪褘械, 泻邪褋褋芯胁褘械 懈 褋谢褍卸械斜薪褘械 褋褌褉芯泻懈 懈褋泻谢褞褔械薪褘."
                      )

                  return

              if old_version < STATE_VERSION:
                  save_state(make_state(new_events))
                  print(
                      f"State migrated from version {old_version} to {STATE_VERSION}. "
                      f"Events tracked: {len(new_events)}. Telegram messages were not sent."
                  )
                  return

              changes = []

              for url, record in new_events.items():
                  old = old_events.get(url)

                  if old is None:
                      summary = record.get("summary") or make_summary(record.get("detail_text", ""))

                      changes.append(
                          "袧芯胁芯械 褋芯斜褘褌懈械 胁 邪褎懈褕械 袦邪褉懈懈薪褋泻芯谐芯 褌械邪褌褉邪\n\n"
                          f"袧邪蟹胁邪薪懈械: {record['title']}\n\n"
                          f"{summary}\n\n"
                          f"小褋褘谢泻邪: {url}"
                      )
                      continue

                  if old.get("digest") != record.get("digest"):
                      diff = make_diff(old.get("detail_text", ""), record.get("detail_text", ""))

                      if not diff:
                          continue

                      changes.append(
                          "袠蟹屑械薪械薪懈械 胁 邪褎懈褕械 袦邪褉懈懈薪褋泻芯谐芯 褌械邪褌褉邪\n\n"
                          f"袧邪蟹胁邪薪懈械: {record['title']}\n"
                          f"小褋褘谢泻邪: {url}\n\n"
                          f"袠蟹屑械薪械薪懈褟:\n{diff}"
                      )

              for url, old in old_events.items():
                  if url not in new_events and not is_past_event(url):
                      title = old.get("title", "袘械蟹 薪邪蟹胁邪薪懈褟")

                      changes.append(
                          "小芯斜褘褌懈械 懈褋褔械蟹谢芯 懈蟹 褌械泻褍褖械泄 邪褎懈褕懈 袦邪褉懈懈薪褋泻芯谐芯 褌械邪褌褉邪\n\n"
                          f"袧邪蟹胁邪薪懈械: {title}\n"
                          f"小褋褘谢泻邪: {url}"
                      )

              save_state(make_state(new_events))

              if changes:
                  for message in changes:
                      send_telegram(message)
                  print(f"Changes sent: {len(changes)}")
              else:
                  print(f"No changes. Events scanned: {len(new_events)}")


          if __name__ == "__main__":
              main()
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run watcher
        run: python mariinsky_agent.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_FILE: state.json
          SEND_INITIAL: "0"

      - name: Update heartbeat
        if: always()
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run_utc.txt

      - name: Commit updated state and heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain state.json last_run_utc.txt)" ]]; then
            git add state.json last_run_utc.txt
            git commit -m "Update Mariinsky watcher state"
            git push
          else
            echo "No state changes to commit."
          fi
