name: Mariinsky Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: mariinsky-watcher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create watcher files
        run: |
          cat > requirements.txt <<'REQ'
          requests==2.32.3
          beautifulsoup4==4.12.3
          REQ

          cat > mariinsky_agent.py <<'PY'
          import difflib
          import hashlib
          import json
          import os
          import re
          import time
          from datetime import date, datetime
          from pathlib import Path
          from urllib.parse import urljoin, urldefrag

          import requests
          from bs4 import BeautifulSoup


          PLAYBILL_URL = "https://www.mariinsky.ru/playbill/playbill/"
          STATE_FILE = Path(os.getenv("STATE_FILE", "state.json"))

          TELEGRAM_BOT_TOKEN = os.getenv("TELEGRAM_BOT_TOKEN", "").strip()
          TELEGRAM_CHAT_ID = os.getenv("TELEGRAM_CHAT_ID", "").strip()

          SEND_INITIAL = os.getenv("SEND_INITIAL", "0") == "1"

          HEADERS = {
              "User-Agent": "Mozilla/5.0 MariinskyWatcher/1.0",
              "Accept-Language": "ru,en;q=0.9",
          }

          TARGET_VENUES = [
              "Мариинский театр",
              "Мариинский-2",
              "Концертный зал Мариинского театра",
              "Концертный зал",
              "Mariinsky Theatre",
              "Mariinsky II",
              "Concert Hall",
          ]

          NOISE_PARTS = [
              "Купить билет",
              "Билетов нет",
              "Заказать билет",
              "Авторизация",
              "Войти",
              "Регистрация",
              "Подписаться",
              "Поиск",
              "Версия для слабовидящих",
              "Cookie",
              "©",
              "Facebook",
              "Instagram",
              "YouTube",
              "VK",
              "Telegram",
          ]


          def fetch(url: str) -> str:
              response = requests.get(url, headers=HEADERS, timeout=30)
              response.raise_for_status()
              return response.text


          def sha256(text: str) -> str:
              return hashlib.sha256(text.encode("utf-8")).hexdigest()


          def clean_line(line: str) -> str:
              line = line.replace("\xa0", " ")
              line = re.sub(r"\s+", " ", line)
              return line.strip()


          def visible_text_from_soup(soup: BeautifulSoup) -> str:
              for tag in soup(["script", "style", "noscript", "svg"]):
                  tag.decompose()

              lines = []
              for raw in soup.get_text("\n").splitlines():
                  line = clean_line(raw)
                  if not line:
                      continue
                  if any(part.lower() in line.lower() for part in NOISE_PARTS):
                      continue
                  lines.append(line)

              result = []
              previous = None
              for line in lines:
                  if line != previous:
                      result.append(line)
                  previous = line

              return "\n".join(result)


          def normalize_url(href: str) -> str:
              absolute = urljoin(PLAYBILL_URL, href)
              absolute = urldefrag(absolute)[0]
              return absolute.rstrip("/") + "/"


          def extract_event_links(index_html: str) -> dict:
              soup = BeautifulSoup(index_html, "html.parser")
              events = {}

              for a in soup.find_all("a", href=True):
                  href = a["href"]

                  if not re.search(r"/playbill/playbill/\d{4}/\d{1,2}/\d{1,2}/", href):
                      continue

                  url = normalize_url(href)
                  link_text = clean_line(a.get_text(" ", strip=True))

                  best_text = link_text
                  parent = a

                  for _ in range(5):
                      parent = parent.parent
                      if parent is None:
                          break

                      text = clean_line(parent.get_text(" ", strip=True))
                      if 20 <= len(text) <= 1800 and len(text) > len(best_text):
                          best_text = text

                  events[url] = best_text

              return events


          def extract_title(detail_soup: BeautifulSoup, fallback: str) -> str:
              h1 = detail_soup.find("h1")
              if h1:
                  title = clean_line(h1.get_text(" ", strip=True))
                  if title:
                      return title

              for line in visible_text_from_soup(detail_soup).splitlines():
                  if len(line) > 3:
                      return line[:160]

              return fallback[:160] or "Без названия"


          def is_ballet(card_text: str, title: str) -> bool:
              sample = f"{card_text}\n{title}".lower()
              return any(
                  word in sample
                  for word in [
                      "балет",
                      "ballet",
                      "хореограф",
                      "choreographic",
                  ]
              )


          def venue_is_allowed(text: str) -> bool:
              low = text.lower()
              return any(venue.lower() in low for venue in TARGET_VENUES)


          def date_from_event_url(url: str):
              match = re.search(r"/playbill/playbill/(\d{4})/(\d{1,2})/(\d{1,2})/", url)
              if not match:
                  return None

              year, month, day = map(int, match.groups())
              try:
                  return date(year, month, day)
              except ValueError:
                  return None


          def is_past_event(url: str) -> bool:
              event_date = date_from_event_url(url)
              if event_date is None:
                  return False
              return event_date < date.today()


          def load_state() -> dict:
              if not STATE_FILE.exists():
                  return {"events": {}}

              try:
                  return json.loads(STATE_FILE.read_text(encoding="utf-8"))
              except Exception:
                  return {"events": {}}


          def save_state(state: dict) -> None:
              STATE_FILE.write_text(
                  json.dumps(state, ensure_ascii=False, indent=2),
                  encoding="utf-8",
              )


          def send_telegram(text: str) -> None:
              if not TELEGRAM_BOT_TOKEN or not TELEGRAM_CHAT_ID:
                  print("Telegram secrets are missing; message was not sent.")
                  return

              url = f"https://api.telegram.org/bot{TELEGRAM_BOT_TOKEN}/sendMessage"

              chunks = [text[i:i + 3900] for i in range(0, len(text), 3900)]
              for chunk in chunks:
                  response = requests.post(
                      url,
                      json={
                          "chat_id": TELEGRAM_CHAT_ID,
                          "text": chunk,
                          "disable_web_page_preview": True,
                      },
                      timeout=30,
                  )
                  response.raise_for_status()


          def make_diff(old_text: str, new_text: str, max_chars: int = 2300) -> str:
              diff = difflib.unified_diff(
                  old_text.splitlines(),
                  new_text.splitlines(),
                  fromfile="было",
                  tofile="стало",
                  lineterm="",
                  n=2,
              )

              lines = []
              for line in diff:
                  if line.startswith(("---", "+++")):
                      continue
                  if line.startswith(("@@", "+", "-")):
                      lines.append(line)

              text = "\n".join(lines).strip()
              if len(text) > max_chars:
                  text = text[:max_chars] + "\n\n[diff обрезан]"
              return text or "[изменение обнаружено, но diff пуст]"


          def build_event_record(url: str, card_text: str) -> dict | None:
              detail_html = fetch(url)
              soup = BeautifulSoup(detail_html, "html.parser")

              title = extract_title(soup, card_text)
              detail_text = visible_text_from_soup(soup)

              combined_for_filters = f"{card_text}\n{title}\n{detail_text}"

              if is_ballet(card_text, title):
                  return None

              if not venue_is_allowed(combined_for_filters):
                  return None

              normalized = "\n".join(
                  line for line in detail_text.splitlines()
                  if line and not any(part.lower() in line.lower() for part in NOISE_PARTS)
              )

              digest = sha256(normalized)

              return {
                  "url": url,
                  "title": title,
                  "card_text": card_text,
                  "detail_text": normalized,
                  "digest": digest,
              }


          def main() -> None:
              old_state = load_state()
              old_events = old_state.get("events", {})

              index_html = fetch(PLAYBILL_URL)
              links = extract_event_links(index_html)

              new_events = {}

              for url, card_text in sorted(links.items()):
                  try:
                      record = build_event_record(url, card_text)
                      if record is not None:
                          new_events[url] = record
                      time.sleep(0.25)
                  except Exception as exc:
                      print(f"Failed to read {url}: {type(exc).__name__}: {exc}")

              changes = []

              if not old_events:
                  state = {
                      "created_at": datetime.utcnow().isoformat() + "Z",
                      "updated_at": datetime.utcnow().isoformat() + "Z",
                      "events": new_events,
                  }
                  save_state(state)

                  print(f"Initial state created. Events tracked: {len(new_events)}")

                  if SEND_INITIAL:
                      send_telegram(
                          "Мониторинг афиши Мариинского театра запущен.\n\n"
                          f"Событий в базе: {len(new_events)}\n"
                          "Балеты исключены."
                      )
                  return

              for url, record in new_events.items():
                  old = old_events.get(url)

                  if old is None:
                      changes.append(
                          "Новое событие в афише Мариинского театра\n\n"
                          f"Название: {record['title']}\n\n"
                          f"{record['card_text'][:900]}\n\n"
                          f"Ссылка: {url}"
                      )
                      continue

                  if old.get("digest") != record.get("digest"):
                      diff = make_diff(old.get("detail_text", ""), record.get("detail_text", ""))
                      changes.append(
                          "Изменение в афише Мариинского театра\n\n"
                          f"Название: {record['title']}\n"
                          f"Ссылка: {url}\n\n"
                          f"Изменения:\n{diff}"
                      )

              for url, old in old_events.items():
                  if url not in new_events and not is_past_event(url):
                      title = old.get("title", "Без названия")
                      changes.append(
                          "Событие исчезло из текущей афиши Мариинского театра\n\n"
                          f"Название: {title}\n"
                          f"Ссылка: {url}"
                      )

              state = {
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "events": new_events,
              }
              save_state(state)

              if changes:
                  for message in changes:
                      send_telegram(message)

                  print(f"Changes sent: {len(changes)}")
              else:
                  print(f"No changes. Events scanned: {len(new_events)}")


          if __name__ == "__main__":
              main()
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run watcher
        run: python mariinsky_agent.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_FILE: state.json
          SEND_INITIAL: "0"

      - name: Update heartbeat
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run_utc.txt

      - name: Commit updated state and heartbeat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain state.json last_run_utc.txt)" ]]; then
            git add state.json last_run_utc.txt
            git commit -m "Update Mariinsky watcher state"
            git push
          else
            echo "No state changes to commit."
          fi
