              assert is_cast_placeholder_line("Состав исполнителей будет объявлен позднее")
              assert is_cast_placeholder_line("Cостав исполнителей будет объявлен позднее")
              assert is_noise("Cостав исполнителей будет объявлен позднее")
              assert not is_performer_line("Cостав исполнителей будет объявлен позднее")
              assert set_diff(["Cостав исполнителей будет объявлен позднее"], []) == ([], [])

