              assert "Абонемент" not in text
              assert "Летучий голландец" not in text and "Аида" not in text and "Набукко" not in text

              assert performer_items_from_line("Дирижер –") == []
              assert performer_items_from_line("Дирижер – Андрей Иванов") == ["Дирижер — Андрей Иванов"]
              assert performer_items_from_line("Солисты — Иван Петров, Мария Сидорова") == ["Солисты — Иван Петров", "Солисты — Мария Сидорова"]
              assert is_performer_line("Симфонический оркестр Мариинского театра")
              assert extract_performers(lines) == [
